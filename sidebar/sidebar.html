<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Custom Firefox</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font: menu;
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(127, 127, 127, 0.25);
      }
      .title {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 600;
      }
      .link {
        color: inherit;
        text-decoration: none;
        opacity: 0.85;
        font-weight: 600;
      }
      .link:hover {
        opacity: 1;
        text-decoration: underline;
      }
      .body {
        height: calc(100% - 41px);
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: none;
      }
      .message {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        text-align: center;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="title" id="title">Sidebar</div>
    </div>
    <div class="body">
      <div class="message" id="message">Right-click a tab → “Open in Side Bar”.</div>
      <iframe id="frame" referrerpolicy="no-referrer"></iframe>
    </div>
    <script src="sidebar.js"></script>
  </body>
</html>
